<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Since</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        background: #111;
        color: #fff;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        text-align: center;
    }

    .container {
        padding: 20px;
    }

    #display {
        font-size: clamp(3rem, 10vw, 8rem);
        font-weight: 900;
        line-height: 1.1;
    }

    #details {
        margin-top: 15px;
        font-size: 1rem;
        opacity: 0.65;
    }

    #editBtn {
        position: fixed;
        bottom: 10px;
        right: 10px;
        border: none;
        background: transparent;
        color: rgba(255,255,255,.25);
        font-size: 12px;
        cursor: pointer;
        padding: 6px;
    }

    #editBtn:hover {
        color: rgba(255,255,255,.6);
    }

    dialog {
        background: #222;
        color: white;
        border: 1px solid #444;
        border-radius: 10px;
        padding: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 15px;
        font-size: 16px;
    }

    .buttons {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }

    button {
        padding: 8px 14px;
        cursor: pointer;
    }
</style>
</head>

<body>

<div class="container">
    <div id="display">0 Days 0 Hours</div>
    <div id="details"></div>
</div>

<button id="editBtn">⚙</button>

<dialog id="editDialog">
    <h3>Set Start Date/Time</h3>

    <input type="datetime-local" id="dateInput">

    <div class="buttons">
        <button id="cancelBtn">Cancel</button>
        <button id="saveBtn">Save</button>
    </div>
</dialog>

<script>
const STORAGE_KEY = "time_since_start";

function getStartDate() {
    let stored = localStorage.getItem(STORAGE_KEY);

    if (!stored) {
        stored = new Date().toISOString();
        localStorage.setItem(STORAGE_KEY, stored);
    }

    return new Date(stored);
}

function saveStartDate(date) {
    localStorage.setItem(STORAGE_KEY, date.toISOString());
}

let startDate = getStartDate();

const display = document.getElementById("display");
const details = document.getElementById("details");

function updateDisplay() {
    const now = new Date();

    let diff = now - startDate;

    if (diff < 0) diff = 0;

    const totalHours = Math.floor(diff / (1000 * 60 * 60));

    const days = Math.floor(totalHours / 24);
    const hours = totalHours % 24;

    display.textContent = `${days} Days ${hours} Hours`;

    details.textContent =
        `Since ${startDate.toLocaleString()}`;
}

updateDisplay();
setInterval(updateDisplay, 1000);

const dialog = document.getElementById("editDialog");
const editBtn = document.getElementById("editBtn");
const dateInput = document.getElementById("dateInput");
const saveBtn = document.getElementById("saveBtn");
const cancelBtn = document.getElementById("cancelBtn");

function formatForInput(date) {
    const pad = n => String(n).padStart(2, "0");

    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

editBtn.addEventListener("click", () => {
    dateInput.value = formatForInput(startDate);
    dialog.showModal();
});

cancelBtn.addEventListener("click", () => {
    dialog.close();
});

saveBtn.addEventListener("click", () => {
    if (!dateInput.value) return;

    startDate = new Date(dateInput.value);

    saveStartDate(startDate);

    updateDisplay();

    dialog.close();
});
</script>

</body>
</html>
