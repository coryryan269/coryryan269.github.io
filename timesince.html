<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Since</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #fff;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      position: relative;
    }

    .time-since {
      font-size: clamp(3rem, 10vw, 9rem);
      font-weight: 800;
      line-height: 1.1;
    }

    .label {
      margin-top: 1rem;
      font-size: clamp(1rem, 2vw, 1.5rem);
      opacity: 0.65;
    }

    .edit-button {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      background: transparent;
      color: rgba(255, 255, 255, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      padding: 0.4rem 0.7rem;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .edit-button:hover {
      color: rgba(255, 255, 255, 0.8);
      border-color: rgba(255, 255, 255, 0.4);
    }

    dialog {
      border: none;
      border-radius: 1rem;
      padding: 1.5rem;
      background: #222;
      color: white;
      max-width: 320px;
      width: calc(100% - 2rem);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.7);
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 0.6rem;
      margin: 0.75rem 0 1rem;
      border-radius: 0.5rem;
      border: none;
      font-size: 1rem;
    }

    .dialog-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .dialog-actions button {
      padding: 0.5rem 0.8rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <main class="container">
    <div id="timeSince" class="time-since">Loading...</div>
    <div id="sinceLabel" class="label"></div>
  </main>

  <button class="edit-button" id="editButton">edit</button>

  <dialog id="editDialog">
    <h2>Change start date/time</h2>
    <input type="datetime-local" id="dateTimeInput" />

    <div class="dialog-actions">
      <button id="cancelButton">Cancel</button>
      <button id="saveButton">Save</button>
    </div>
  </dialog>

  <script>
    const STORAGE_KEY = "persistentSinceDateTime";

    const timeSinceEl = document.getElementById("timeSince");
    const sinceLabelEl = document.getElementById("sinceLabel");
    const editButton = document.getElementById("editButton");
    const editDialog = document.getElementById("editDialog");
    const dateTimeInput = document.getElementById("dateTimeInput");
    const cancelButton = document.getElementById("cancelButton");
    const saveButton = document.getElementById("saveButton");

    function getStoredStartTime() {
      const stored = localStorage.getItem(STORAGE_KEY);

      if (stored) {
        return new Date(stored);
      }

      const now = new Date();
      localStorage.setItem(STORAGE_KEY, now.toISOString());
      return now;
    }

    let startTime = getStoredStartTime();

    function pad(number) {
      return String(number).padStart(2, "0");
    }

    function toDateTimeLocalValue(date) {
      const year = date.getFullYear();
      const month = pad(date.getMonth() + 1);
      const day = pad(date.getDate());
      const hours = pad(date.getHours());
      const minutes = pad(date.getMinutes());

      return `${year}-${month}-${day}T${hours}:${minutes}`;
    }

    function formatSinceLabel(date) {
      return `Since ${date.toLocaleString()}`;
    }

    function updateDisplay() {
      const now = new Date();
      let diffMs = now - startTime;

      if (diffMs < 0) diffMs = 0;

      const totalHours = Math.floor(diffMs / 1000 / 60 / 60);
      const days = Math.floor(totalHours / 24);
      const hours = totalHours % 24;

      timeSinceEl.textContent = `${days} days, ${hours} hours`;
      sinceLabelEl.textContent = formatSinceLabel(startTime);
    }

    editButton.addEventListener("click", () => {
      dateTimeInput.value = toDateTimeLocalValue(startTime);
      editDialog.showModal();
    });

    cancelButton.addEventListener("click", () => {
      editDialog.close();
    });

    saveButton.addEventListener("click", () => {
      if (!dateTimeInput.value) return;

      startTime = new Date(dateTimeInput.value);
      localStorage.setItem(STORAGE_KEY, startTime.toISOString());

      updateDisplay();
      editDialog.close();
    });

    updateDisplay();
    setInterval(updateDisplay, 1000 * 30);
  </script>
</body>
</html>
