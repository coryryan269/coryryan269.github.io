<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Repeating To-Do Cycle</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 850px; margin: 40px auto; padding: 0 16px; background: #f6f6f6; }
    .card { background: white; padding: 20px; border-radius: 14px; box-shadow: 0 2px 10px rgba(0,0,0,.08); margin-bottom: 20px; }
    button, input { font: inherit; padding: 8px 10px; border-radius: 8px; border: 1px solid #ccc; }
    button { cursor: pointer; background: #fff; }
    button.primary { background: #111; color: white; border-color: #111; }
    .row { display: flex; gap: 8px; margin-top: 10px; }
    .row input { flex: 1; }
    .task { display: grid; grid-template-columns: 40px 40px 1fr auto auto auto; gap: 8px; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
    .task:last-child { border-bottom: 0; }
    .small { font-size: .85rem; color: #666; }
    .empty { color: #777; font-style: italic; }
  </style>
</head>
<body>

<h1>Repeating To-Do Cycle</h1>

<div class="card">
  <h2>Add Task</h2>
  <div class="row">
    <input id="newTaskInput" placeholder="New repeating task..." />
    <button onclick="addTask()">Add</button>
  </div>
</div>

<div class="card">
  <h2>Task List</h2>
  <div class="small">Top item is the next thing to do. Completing any task moves it to the bottom.</div>
  <div id="taskList"></div>
</div>

<script>
const STORAGE_KEY = "repeatingTodoCycle.v2";

let state = {
  tasks: []
};

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function load() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) return;

  try {
    state = JSON.parse(saved);
    if (!Array.isArray(state.tasks)) state.tasks = [];
  } catch {
    state = { tasks: [] };
    save();
  }
}

function uid() {
  return crypto.randomUUID
    ? crypto.randomUUID()
    : Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function formatDate(value) {
  if (!value) return "Never completed";
  return new Date(value).toLocaleString();
}

function render() {
  const taskList = document.getElementById("taskList");
  taskList.innerHTML = "";

  if (state.tasks.length === 0) {
    taskList.innerHTML = `<p class="empty">Add a task to start the cycle.</p>`;
    save();
    return;
  }

  state.tasks.forEach((task, index) => {
    if (!Array.isArray(task.history)) task.history = [];

    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <button title="Move up" ${index === 0 ? "disabled" : ""}>↑</button>
      <button title="Move down" ${index === state.tasks.length - 1 ? "disabled" : ""}>↓</button>

      <div>
        <input value="${escapeHtml(task.text)}" />
        <div class="small">Last completed: ${formatDate(task.lastCompletedAt)}</div>
      </div>

      <button class="primary">Done</button>
      <button ${task.history.length === 0 ? "disabled" : ""}>Undo</button>
      <button>Delete</button>
    `;

    const buttons = div.querySelectorAll("button");
    const input = div.querySelector("input");

    buttons[0].onclick = () => moveTask(index, -1);
    buttons[1].onclick = () => moveTask(index, 1);
    buttons[2].onclick = () => completeTask(task.id);
    buttons[3].onclick = () => undoTask(task.id);
    buttons[4].onclick = () => deleteTask(task.id);

    input.onchange = () => editTask(task.id, input.value);

    taskList.appendChild(div);
  });

  save();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, char => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[char]));
}

function addTask() {
  const input = document.getElementById("newTaskInput");
  const text = input.value.trim();
  if (!text) return;

  state.tasks.push({
    id: uid(),
    text,
    lastCompletedAt: null,
    history: []
  });

  input.value = "";
  save();
  render();
}

function editTask(id, newText) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;

  const trimmed = newText.trim();
  if (!trimmed) {
    render();
    return;
  }

  task.text = trimmed;
  save();
  render();
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  save();
  render();
}

function moveTask(index, direction) {
  const newIndex = index + direction;
  if (newIndex < 0 || newIndex >= state.tasks.length) return;

  const [task] = state.tasks.splice(index, 1);
  state.tasks.splice(newIndex, 0, task);

  save();
  render();
}

function completeTask(id) {
  const index = state.tasks.findIndex(t => t.id === id);
  if (index === -1) return;

  const task = state.tasks[index];

  task.history.push({
    previousLastCompletedAt: task.lastCompletedAt,
    previousIndex: index
  });

  task.lastCompletedAt = new Date().toISOString();

  state.tasks.splice(index, 1);
  state.tasks.push(task);

  save();
  render();
}

function undoTask(id) {
  const currentIndex = state.tasks.findIndex(t => t.id === id);
  if (currentIndex === -1) return;

  const task = state.tasks[currentIndex];
  if (!task.history || task.history.length === 0) return;

  const last = task.history.pop();

  task.lastCompletedAt = last.previousLastCompletedAt;

  state.tasks.splice(currentIndex, 1);

  const restoreIndex = Math.min(last.previousIndex, state.tasks.length);
  state.tasks.splice(restoreIndex, 0, task);

  save();
  render();
}

document.getElementById("newTaskInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addTask();
});

load();
render();
</script>

</body>
</html>
